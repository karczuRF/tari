[[audits.mintex]]
who = "Hansie Odendaal <pluto@tari.com>"
criteria = "safe-to-deploy"
version = "0.1.3"
notes = """
Notes:
- The implementation is minimal and does not handle poisoning or fair locking. This is acceptable for a
  lightweight mutex but should be documented.
- The use of `unsafe` is sound and does not introduce security vulnerabilities.
- Spinlock behavior may lead to performance issues under high contention and should be documented as a
  limitation.
"""

