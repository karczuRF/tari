
# cargo-vet audits file

[[audits.dhat]]
who = "Hansie Odendaal <pluto@tari.com>"
criteria = "safe-to-deploy"
version = "0.3.3"
notes = """
- `dhat` is a heap profiling crate for Rust, primarily used for debugging and profiling.
- It has minimal, well-contained unsafe code, which is sound and not exploitable.
- The crate does not perform file system operations, rely on ambient capabilities, or generate deployed code.
- No vulnerabilities or unexpected behaviors were identified, and it aligns with its advertised functionality.
"""

